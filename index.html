<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Мої задачі</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:        var(--tg-theme-secondary-bg-color, #eff2f6);
      --card:      var(--tg-theme-bg-color, #ffffff);
      --text:      var(--tg-theme-text-color, #0e1621);
      --hint:      var(--tg-theme-hint-color, #8a97a5);
      --accent:    var(--tg-theme-button-color, #2ea6ff);
      --accent-tx: var(--tg-theme-button-text-color, #ffffff);
      --sep:       color-mix(in srgb, var(--hint) 22%, transparent);
      --s-todo:  #8a97a5;
      --s-prog:  #f5a623;
      --s-done:  #34c759;
      --s-err:   #ff3b30;
      --radius: 16px;
      --gap: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:   var(--tg-theme-secondary-bg-color, #17212b);
        --card: var(--tg-theme-bg-color, #232e3c);
        --text: var(--tg-theme-text-color, #ffffff);
        --hint: var(--tg-theme-hint-color, #6d7c8b);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px; line-height: 1.4; overscroll-behavior-y: none;
    }
    button { font-family: inherit; cursor: pointer; }
    .app { min-height: 100vh; padding-top: var(--safe-top); }
    [hidden] { display: none !important; }

    /* ── Стани: loading / error ─────────────────── */
    .state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 80px 28px; min-height: 60vh; color: var(--hint);
    }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid color-mix(in srgb, var(--hint) 25%, transparent);
      border-top-color: var(--accent); animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state h3 { margin: 0; font-size: 17px; color: var(--text); font-weight: 600; }
    .state .retry {
      margin-top: 6px; border: none; border-radius: 11px; padding: 12px 22px;
      background: var(--accent); color: var(--accent-tx); font-size: 15px; font-weight: 600;
    }

    /* ── Хедер ──────────────────────────────────── */
    .head { display: flex; align-items: center; gap: 12px; padding: 18px 16px 10px; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%; flex: 0 0 auto; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent); color: var(--accent-tx); font-weight: 600; font-size: 18px;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .head h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.2px; }
    .head p  { margin: 1px 0 0; font-size: 13px; color: var(--hint); }
    .reset { margin-left: auto; background: none; border: none; color: var(--hint); font-size: 12px; padding: 6px; display: none; }
    body.demo .reset { display: inline; }

    /* ── Фільтри ────────────────────────────────── */
    .filters { display: flex; gap: 6px; margin: 4px 16px 14px;
      background: color-mix(in srgb, var(--hint) 14%, transparent); padding: 3px; border-radius: 12px; }
    .filters button { flex: 1; border: none; background: none; color: var(--hint);
      font-size: 13px; font-weight: 600; padding: 7px 4px; border-radius: 9px; transition: background .15s, color .15s; }
    .filters button.on { background: var(--card); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

    /* ── Список ─────────────────────────────────── */
    .list { padding: 0 16px calc(28px + var(--safe-bottom)); display: flex; flex-direction: column; gap: var(--gap); }
    .task { position: relative; background: var(--card); border-radius: var(--radius);
      padding: 14px 14px 14px 18px; overflow: hidden; display: flex; gap: 12px; align-items: flex-start; transition: transform .08s ease; }
    .task:active { transform: scale(.985); }
    .task::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--bar, var(--s-todo)); }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 16px; font-weight: 600; letter-spacing: -0.1px; margin: 0 0 3px; }
    .task.completed .task-title { color: var(--hint); text-decoration: line-through; text-decoration-color: color-mix(in srgb, var(--hint) 60%, transparent); }
    .task-desc { font-size: 13.5px; color: var(--hint); margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .task-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .due { font-size: 12px; color: var(--hint); margin-left: auto; }
    .due.overdue { color: var(--s-err); font-weight: 700; }
    .pill { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
      background: color-mix(in srgb, var(--pc, var(--s-todo)) 16%, transparent); color: var(--pc, var(--s-todo)); }

    .ring { flex: 0 0 auto; position: relative; width: 38px; height: 38px; }
    .ring > svg { transform: rotate(-90deg); display: block; } /* лише кільце прогресу, не галочка */
    .ring .track { stroke: color-mix(in srgb, var(--hint) 22%, transparent); }
    .ring .fill  { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset .4s cubic-bezier(.4,0,.2,1); }
    .ring.done .fill { stroke: var(--s-done); }
    .ring b { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .ring .tick { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; color: var(--s-done); }
    .ring.done b { display: none; }
    .ring.done .tick { display: flex; }

    /* ── Деталі ─────────────────────────────────── */
    .detail { padding: 8px 16px calc(120px + var(--safe-bottom)); }
    .back { display: none; align-items: center; gap: 4px; background: none; border: none; color: var(--accent); font-size: 16px; padding: 8px 0; margin: 4px 0 4px -2px; }
    body.no-tg .back { display: inline-flex; }
    .detail h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin: 6px 0 10px; }
    .detail .meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .detail .full-desc { font-size: 15px; color: var(--text); opacity: .9; margin: 0 0 18px; }
    .progress-line { margin-bottom: 20px; }
    .progress-line .lbl { display: flex; justify-content: space-between; font-size: 13px; color: var(--hint); margin-bottom: 7px; }
    .progress-line .lbl b { color: var(--text); font-variant-numeric: tabular-nums; }
    .bar { height: 8px; border-radius: 20px; background: color-mix(in srgb, var(--hint) 20%, transparent); overflow: hidden; }
    .bar i { display: block; height: 100%; border-radius: 20px; background: var(--accent); transition: width .4s cubic-bezier(.4,0,.2,1); }
    .bar.done i { background: var(--s-done); }
    .sec-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--hint); margin: 0 0 8px; }
    .check { background: var(--card); border-radius: 12px; overflow: hidden; }
    .check-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-bottom: 1px solid var(--sep); user-select: none; transition: background .1s; }
    .check-item:last-child { border-bottom: none; }
    .check-item:active { background: color-mix(in srgb, var(--hint) 8%, transparent); }
    .check-item.pending { opacity: .5; pointer-events: none; }
    .box { width: 24px; height: 24px; border-radius: 50%; flex: 0 0 auto;
      border: 2px solid color-mix(in srgb, var(--hint) 55%, transparent);
      display: flex; align-items: center; justify-content: center; color: #fff; transition: background .15s, border-color .15s, transform .15s; }
    .check-item.on .box { background: var(--s-done); border-color: var(--s-done); transform: scale(1.05); }
    .box svg { opacity: 0; transition: opacity .12s; }
    .check-item.on .box svg { opacity: 1; }
    .check-item span { font-size: 15px; transition: color .15s; }
    .check-item.on span { color: var(--hint); text-decoration: line-through; }

    .action-bar { display: none; position: fixed; left: 0; right: 0; bottom: 0;
      padding: 12px 16px calc(12px + var(--safe-bottom)); background: linear-gradient(to top, var(--bg) 60%, transparent); }
    body.no-tg .action-bar { display: block; }
    .action-bar button { width: 100%; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 600; background: var(--accent); color: var(--accent-tx); }
    .action-bar button.done-state { background: var(--s-done); }
    .action-bar button:disabled { opacity: .6; }

    .empty { text-align: center; color: var(--hint); padding: 60px 20px; font-size: 15px; }

    /* ── Toast ──────────────────────────────────── */
    .toast { position: fixed; left: 50%; bottom: calc(24px + var(--safe-bottom)); transform: translate(-50%, 20px);
      background: var(--s-err); color: #fff; font-size: 14px; font-weight: 500; padding: 11px 18px; border-radius: 12px;
      max-width: 84%; text-align: center; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 50; box-shadow: 0 6px 20px rgba(0,0,0,.25); }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.ok { background: var(--s-done); }

    /* ── Вкладення (файли/фото → коментар) ──────── */
    .attach { margin-top: 8px; }
    .comment-input {
      width: 100%; border: 1px solid var(--sep); border-radius: 12px; background: var(--card); color: var(--text);
      font: inherit; font-size: 15px; padding: 11px 13px; resize: vertical; min-height: 44px; margin-bottom: 10px; }
    .comment-input:focus { outline: none; border-color: var(--accent); }
    .file-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .file-list:not(:empty) { margin-bottom: 12px; }
    .file-chip { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--sep);
      border-radius: 10px; padding: 6px 8px 6px 6px; max-width: 100%; }
    .file-chip .thumb { width: 34px; height: 34px; border-radius: 7px; object-fit: cover; flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center; background: color-mix(in srgb, var(--hint) 16%, transparent); font-size: 17px; }
    .file-chip .fn { font-size: 13px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-chip .rm { border: none; background: none; color: var(--hint); font-size: 14px; padding: 2px 4px; line-height: 1; }
    .attach-actions { display: flex; gap: 10px; }
    .attach-btn { flex: 0 0 auto; border: 1px solid var(--sep); background: var(--card); color: var(--accent);
      border-radius: 11px; padding: 12px 16px; font-size: 15px; font-weight: 600; }
    .send-btn { flex: 1; border: none; border-radius: 11px; padding: 12px; font-size: 15px; font-weight: 600;
      background: var(--accent); color: var(--accent-tx); }
    .send-btn:disabled { opacity: .5; }
    .sent-list:not(:empty) { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
    .sent-item { font-size: 13px; color: var(--s-done); }

    /* ── Коментарі задачі ───────────────────────── */
    .sec-head { display: flex; align-items: center; justify-content: space-between; margin: 24px 0 8px; }
    .sec-head .sec-title { margin: 0; }
    .cmt-refresh { border: none; background: none; color: var(--accent); font-size: 13px; font-weight: 600; padding: 4px 6px; }
    .comments { display: flex; flex-direction: column; gap: 8px; }
    .cmt { background: var(--card); border-radius: 12px; padding: 11px 13px; }
    .cmt-top { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .cmt-author { font-size: 13px; font-weight: 700; }
    .cmt-date { font-size: 12px; color: var(--hint); white-space: nowrap; }
    .cmt-text { font-size: 14px; margin: 0; word-break: break-word; }
    .cmt-files { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
    .cmt-files a { font-size: 13px; color: var(--accent); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cmt-hint { font-size: 13px; color: var(--hint); padding: 12px 4px; }

    .screen { display: none; }
    .screen.active { display: block; animation: fade .18s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none;} }
  </style>
</head>
<body>
  <div class="app">
    <!-- Стан завантаження -->
    <div id="stateLoading" class="state">
      <div class="spinner"></div>
      <p>Завантаження задач…</p>
    </div>

    <!-- Стан помилки -->
    <div id="stateError" class="state" hidden>
      <h3>Не вдалося завантажити задачі</h3>
      <p id="errText">Перевірте з'єднання та спробуйте ще раз.</p>
      <button class="retry" id="retryBtn">Повторити</button>
    </div>

    <!-- Робочий інтерфейс -->
    <div id="appRoot" hidden>
      <section id="listScreen" class="screen active">
        <div class="head">
          <div class="avatar" id="avatar"></div>
          <div>
            <h1 id="greeting">Привіт!</h1>
            <p id="subgreet">Ваші задачі</p>
          </div>
          <button class="reset" id="resetBtn">Скинути демо</button>
        </div>
        <div class="filters" id="filters">
          <button data-f="active" class="on">Активні</button>
          <button data-f="done">Виконані</button>
          <button data-f="all">Всі</button>
        </div>
        <div class="list" id="list"></div>
      </section>

      <section id="detailScreen" class="screen">
        <div class="detail">
          <button class="back" id="backBtn">‹ Назад</button>
          <div class="meta"><span class="pill" id="dPill"></span><span class="due" id="dDue"></span></div>
          <h2 id="dTitle"></h2>
          <p class="full-desc" id="dDesc"></p>
          <div class="progress-line">
            <div class="lbl"><span>Прогрес чек-листа</span><b id="dProg"></b></div>
            <div class="bar" id="dBar"><i></i></div>
          </div>
          <p class="sec-title">Чек-лист</p>
          <div class="check" id="dCheck"></div>

          <p class="sec-title" style="margin-top:24px">Файли та фото</p>
          <div class="attach">
            <textarea class="comment-input" id="cmtText" rows="1" placeholder="Коментар (необов'язково)"></textarea>
            <div class="file-list" id="fileList"></div>
            <div class="attach-actions">
              <button class="attach-btn" id="pickBtn">📎 Прикріпити</button>
              <button class="send-btn" id="sendBtn" disabled>Надіслати в задачу</button>
            </div>
            <div class="sent-list" id="sentList"></div>
          </div>

          <div class="sec-head">
            <p class="sec-title">Коментарі</p>
            <button class="cmt-refresh" id="cmtRefresh">⟳ Оновити</button>
          </div>
          <div class="comments" id="cmtList"></div>
          <input type="file" id="fileInput" multiple hidden
                 accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt,.csv,.zip" />
        </div>
        <div class="action-bar" id="actionBar">
          <button id="actionBtn">Завершити задачу</button>
        </div>
      </section>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  /* ══════════════════════════════════════════════════════════════
     0. КОНФІГ. Заповнити базовий URL продакшн-вебхуків n8n.
     ══════════════════════════════════════════════════════════════ */
  const API_BASE = 'https://n8n.srv1253421.hstgr.cloud/webhook';

  /* ── Telegram ─────────────────────────────────────────────────── */
  const tg = window.Telegram?.WebApp;
  const user = tg?.initDataUnsafe?.user || null;
  const initData = tg?.initData || '';
  const inTelegram = !!user && initData.length > 0;

  if (tg) {
    tg.ready(); tg.expand();
    try { tg.setBackgroundColor?.('secondary_bg_color'); } catch (e) {}
    try { tg.setHeaderColor?.('secondary_bg_color'); } catch (e) {}
  }
  if (!inTelegram) document.body.classList.add('no-tg');

  function haptic(type) {
    try {
      const h = tg?.HapticFeedback; if (!h) return;
      if (type === 'success' || type === 'error' || type === 'warning') h.notificationOccurred(type);
      else h.impactOccurred(type || 'light');
    } catch (e) {}
  }

  /* ══════════════════════════════════════════════════════════════
     1. API (n8n → Uspacy). Усі запити несуть initData для авторизації.
     ══════════════════════════════════════════════════════════════ */
  async function post(path, payload) {
    const r = await fetch(API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData, ...payload }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }
  async function loadTasksFromApi() {
    const res = await post('/webapp/tasks', {});
    if (!res.ok) throw new Error(res.error || 'load_failed');
    return res.tasks || [];
  }
  const completeTaskApi = (taskId, done) => post('/webapp/task-complete', { taskId, done });
  const commentsApi     = (taskId) => post('/webapp/task-comments', { taskId });
  const toggleCheckApi  = (taskId, checklistId, itemId, done) =>
        post('/webapp/checklist-toggle', { taskId, checklistId, itemId, done });

  /* ══════════════════════════════════════════════════════════════
     2. ДЕМО-ДАНІ (лише поза Telegram — для показу без бекенда).
     ══════════════════════════════════════════════════════════════ */
  const DEMO_TASKS = [
    { id: 't1', title: 'Підготувати комерційну пропозицію',
      desc: 'КП для ТОВ «Оріон» з розрахунком вартості впровадження CRM.', due: 'до 05.07', completed: false,
      checklist: [
        { id: 'c1', checklistId: 'cl1', text: 'Зібрати вимоги клієнта', done: false },
        { id: 'c2', checklistId: 'cl1', text: 'Підготувати кошторис', done: false },
        { id: 'c3', checklistId: 'cl1', text: 'Узгодити з керівником', done: false },
        { id: 'c4', checklistId: 'cl1', text: 'Надіслати клієнту', done: false } ] },
    { id: 't2', title: 'Налаштувати інтеграцію з CRM',
      desc: 'Підключити форми із сайту до воронки продажів через вебхук.', due: 'до 06.07', completed: false,
      checklist: [
        { id: 'c1', checklistId: 'cl2', text: 'Створити вебхук у n8n', done: true },
        { id: 'c2', checklistId: 'cl2', text: 'Замапити поля форми', done: false },
        { id: 'c3', checklistId: 'cl2', text: 'Протестувати заявку', done: false },
        { id: 'c4', checklistId: 'cl2', text: 'Увімкнути на проді', done: false } ] },
    { id: 't3', title: 'Провести демо для клієнта',
      desc: 'Показати можливості Telegram WebApp на живому прикладі.', due: 'сьогодні', completed: true,
      checklist: [
        { id: 'c1', checklistId: 'cl3', text: 'Підготувати сценарій', done: true },
        { id: 'c2', checklistId: 'cl3', text: 'Розгорнути демо-стенд', done: true },
        { id: 'c3', checklistId: 'cl3', text: 'Провести зустріч', done: true } ] },
    { id: 't4', title: 'Опрацювати нові заявки',
      desc: '12 заявок з реклами за вихідні — розподілити та прозвонити.', due: 'до 05.07', completed: false,
      checklist: [
        { id: 'c1', checklistId: 'cl4', text: 'Розподілити по менеджерах', done: false },
        { id: 'c2', checklistId: 'cl4', text: 'Зателефонувати гарячим', done: false },
        { id: 'c3', checklistId: 'cl4', text: 'Оновити статуси в CRM', done: false } ] },
  ];

  /* ══════════════════════════════════════════════════════════════
     3. СТАН
     ══════════════════════════════════════════════════════════════ */
  let tasks = [];
  let currentFilter = 'active';
  let openTaskId = null;

  const $ = (s) => document.querySelector(s);

  function status(t) {
    if (t.completed) return 'done';
    if (t.checklist.some((c) => c.done)) return 'in_progress';
    return 'todo';
  }
  const STATUS_META = {
    todo:        { label: 'Нова',     color: 'var(--s-todo)' },
    in_progress: { label: 'В роботі', color: 'var(--s-prog)' },
    done:        { label: 'Виконано', color: 'var(--s-done)' },
  };
  const doneCount = (t) => t.checklist.filter((c) => c.done).length;

  /* Дедлайн: unix-секунди з Uspacy → "до 03.07.2026" + ознака простроченості */
  function dueInfo(t) {
    if (!t.due) return { text: '', overdue: false };
    let ms = t.due;
    if (typeof ms === 'string' && /^\d+$/.test(ms.trim())) ms = Number(ms.trim());
    if (typeof ms !== 'number') return { text: String(t.due), overdue: false }; // демо-рядки типу "до 05.07"
    if (ms < 1e12) ms *= 1000; // секунди → мілісекунди
    const dt = new Date(ms);
    if (isNaN(dt)) return { text: String(t.due), overdue: false };
    const text = 'до ' + dt.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const overdue = !t.completed && ms < Date.now();
    return { text, overdue };
  }
  const escapeHtml = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  let toastT;
  function toast(msg) {
    const el = $('#toast'); el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2600);
  }
  function showState(s) {
    $('#stateLoading').hidden = s !== 'loading';
    $('#stateError').hidden = s !== 'error';
    $('#appRoot').hidden = s !== 'app';
  }

  /* ══════════════════════════════════════════════════════════════
     4. РЕНДЕР
     ══════════════════════════════════════════════════════════════ */
  function renderHeader() {
    const name = user?.first_name || 'Гість';
    $('#greeting').textContent = `Привіт, ${name}!`;
    $('#subgreet').textContent = inTelegram ? 'Ваші задачі' : 'Демо-режим · без підключення';
    const av = $('#avatar');
    if (user?.photo_url) av.innerHTML = `<img src="${user.photo_url}" alt="">`;
    else av.textContent = (name[0] || 'Г').toUpperCase();
  }

  function renderList() {
    const list = $('#list');
    const filtered = tasks.filter((t) => {
      if (currentFilter === 'active') return !t.completed;
      if (currentFilter === 'done') return t.completed;
      return true;
    });
    if (!filtered.length) {
      list.innerHTML = `<div class="empty">Тут поки порожньо.</div>`;
      return;
    }
    const R = 15, C = 2 * Math.PI * R;
    list.innerHTML = filtered.map((t) => {
      const meta = STATUS_META[status(t)];
      const done = doneCount(t), total = t.checklist.length;
      const offset = C * (1 - (total ? done / total : 0));
      const due = dueInfo(t);
      return `
        <div class="task ${t.completed ? 'completed' : ''}" data-id="${t.id}" style="--bar:${meta.color}">
          <div class="task-body">
            <p class="task-title">${escapeHtml(t.title)}</p>
            <p class="task-desc">${escapeHtml(t.desc)}</p>
            <div class="task-foot">
              <span class="pill" style="--pc:${meta.color}">${meta.label}</span>
              <span class="due ${due.overdue ? 'overdue' : ''}">${due.overdue ? '⚠ ' : ''}${escapeHtml(due.text)}</span>
            </div>
          </div>
          <div class="ring ${t.completed ? 'done' : ''}">
            <svg width="38" height="38" viewBox="0 0 38 38">
              <circle class="track" cx="19" cy="19" r="${R}" fill="none" stroke-width="3.5"/>
              <circle class="fill" cx="19" cy="19" r="${R}" fill="none" stroke-width="3.5"
                stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
            </svg>
            <b>${done}/${total}</b>
            <div class="tick"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
          </div>
        </div>`;
    }).join('');
  }

  function renderDetail() {
    const t = tasks.find((x) => x.id === openTaskId);
    if (!t) return;
    const meta = STATUS_META[status(t)];
    const done = doneCount(t), total = t.checklist.length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    $('#dTitle').textContent = t.title;
    $('#dDesc').textContent = t.desc;
    const due = dueInfo(t);
    const dDue = $('#dDue');
    dDue.textContent = (due.overdue ? '⚠ ' : '') + due.text;
    dDue.classList.toggle('overdue', due.overdue);
    const pill = $('#dPill'); pill.textContent = meta.label; pill.style.setProperty('--pc', meta.color);
    $('#dProg').textContent = `${done} / ${total}`;
    const bar = $('#dBar'); bar.classList.toggle('done', t.completed); bar.querySelector('i').style.width = pct + '%';

    $('#dCheck').innerHTML = t.checklist.map((c) => `
      <div class="check-item ${c.done ? 'on' : ''}" data-cid="${c.id}">
        <div class="box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <span>${escapeHtml(c.text)}</span>
      </div>`).join('');
    updateAction(t);
  }

  function updateAction(t) {
    const allDone = t.checklist.length > 0 && t.checklist.every((c) => c.done);
    const btn = $('#actionBtn');
    btn.textContent = t.completed ? 'Відновити задачу' : (allDone ? '✓ Завершити задачу' : 'Завершити задачу');
    btn.classList.toggle('done-state', allDone && !t.completed);
    if (inTelegram && tg?.MainButton) {
      tg.MainButton.setText(t.completed ? 'Відновити задачу' : 'Завершити задачу');
      tg.MainButton.show();
    }
  }

  /* ══════════════════════════════════════════════════════════════
     5. НАВІГАЦІЯ
     ══════════════════════════════════════════════════════════════ */
  function openDetail(id) {
    openTaskId = id; renderDetail();
    resetAttach();
    loadComments();
    $('#listScreen').classList.remove('active');
    $('#detailScreen').classList.add('active');
    window.scrollTo(0, 0);
    if (inTelegram && tg?.BackButton) tg.BackButton.show();
    haptic('light');
  }
  function goBack() {
    openTaskId = null;
    $('#detailScreen').classList.remove('active');
    $('#listScreen').classList.add('active');
    renderList();
    if (inTelegram) { tg?.BackButton?.hide(); tg?.MainButton?.hide(); }
  }

  /* ══════════════════════════════════════════════════════════════
     6. ДІЇ (оптимістичне оновлення з відкатом при помилці)
     ══════════════════════════════════════════════════════════════ */
  async function toggleCheck(cid, rowEl) {
    const t = tasks.find((x) => x.id === openTaskId);
    const item = t.checklist.find((c) => c.id === cid);
    if (!item) return;
    const newVal = !item.done;

    item.done = newVal;
    if (newVal && t.completed) t.completed = false;
    renderDetail();
    haptic(newVal ? 'medium' : 'light');

    if (!inTelegram) return; // демо: лише локально

    try {
      const res = await toggleCheckApi(t.id, item.checklistId, item.id, newVal);
      if (!res.ok) throw new Error(res.error || 'save_failed');
    } catch (e) {
      item.done = !newVal;          // відкат
      renderDetail();
      haptic('error');
      toast('Не вдалося зберегти пункт');
    }
  }

  async function completeTask() {
    const t = tasks.find((x) => x.id === openTaskId);
    if (!t) return;
    const makeDone = !t.completed;

    if (!inTelegram) { // демо
      if (makeDone) t.checklist.forEach((c) => (c.done = true));
      t.completed = makeDone; haptic('success'); goBack(); return;
    }

    const btn = $('#actionBtn'); btn.disabled = true;
    try { tg?.MainButton?.showProgress?.(); } catch (e) {}
    try {
      const res = await completeTaskApi(t.id, makeDone);
      if (!res.ok) throw new Error(res.error || 'update_failed');
      t.completed = makeDone;
      if (makeDone) t.checklist.forEach((c) => (c.done = true));
      haptic('success');
      try { tg?.MainButton?.hideProgress?.(); } catch (e) {}
      goBack();
    } catch (e) {
      try { tg?.MainButton?.hideProgress?.(); } catch (e2) {}
      haptic('error');
      toast(t.completed ? 'Не вдалося відновити задачу' : 'Не вдалося завершити задачу');
    } finally {
      btn.disabled = false;
    }
  }

  /* ── Файли / фото → коментар до задачі ─────────────────────────── */
  const MAX_FILE_MB = 10;
  let pendingFiles = [];

  function resetAttach() {
    pendingFiles = [];
    const ta = $('#cmtText'); if (ta) ta.value = '';
    if ($('#fileList')) $('#fileList').innerHTML = '';
    if ($('#sentList')) $('#sentList').innerHTML = '';
    updateSendBtn();
  }
  function updateSendBtn() {
    const ta = $('#cmtText');
    if ($('#sendBtn')) $('#sendBtn').disabled = !(pendingFiles.length || (ta && ta.value.trim()));
  }
  function renderFiles() {
    $('#fileList').innerHTML = pendingFiles.map((f, i) => {
      const thumb = f.preview
        ? `<img class="thumb" src="${f.preview}" alt="">`
        : `<span class="thumb">📄</span>`;
      return `<div class="file-chip">${thumb}<span class="fn">${escapeHtml(f.name)}</span><button class="rm" data-i="${i}">✕</button></div>`;
    }).join('');
    updateSendBtn();
  }
  function readAsBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => { const s = String(r.result); res(s.slice(s.indexOf(',') + 1)); };
      r.onerror = () => rej(new Error('read_failed'));
      r.readAsDataURL(file);
    });
  }
  async function onPickFiles(e) {
    const files = [...e.target.files];
    e.target.value = '';
    for (const file of files) {
      if (file.size > MAX_FILE_MB * 1024 * 1024) { toast(`«${file.name}» більший за ${MAX_FILE_MB} МБ`); continue; }
      const data = await readAsBase64(file);
      const type = file.type || 'application/octet-stream';
      pendingFiles.push({ name: file.name, type, data,
        preview: type.startsWith('image/') ? ('data:' + type + ';base64,' + data) : '' });
    }
    renderFiles();
    haptic('light');
  }
  function addSent(text, files) {
    const names = files.map((f) => f.name).join(', ');
    const line = document.createElement('div');
    line.className = 'sent-item';
    line.textContent = '✓ ' + (text ? text + ' · ' : '') + (names || 'коментар');
    $('#sentList').prepend(line);
  }
  async function sendComment() {
    const t = tasks.find((x) => x.id === openTaskId); if (!t) return;
    const text = $('#cmtText').value.trim();
    if (!pendingFiles.length && !text) return;

    const btn = $('#sendBtn'); btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Надсилання…';
    const sentFiles = pendingFiles.slice();

    if (!inTelegram) { // демо-режим: без бекенда
      addSent(text, sentFiles); pendingFiles = []; $('#cmtText').value = ''; renderFiles();
      btn.textContent = orig; haptic('success'); toastOk('Додано до задачі (демо)');
      return;
    }
    try {
      const res = await post('/webapp/task-comment', {
        taskId: t.id,
        text,
        files: sentFiles.map((f) => ({ name: f.name, type: f.type, data: f.data })),
      });
      if (!res.ok) throw new Error(res.error || 'send_failed');
      addSent(text, sentFiles); pendingFiles = []; $('#cmtText').value = ''; renderFiles();
      haptic('success'); toastOk('Додано до задачі');
      loadComments();
    } catch (e) {
      haptic('error'); toast('Не вдалося надіслати');
    } finally {
      btn.textContent = orig; updateSendBtn();
    }
  }
  /* ── Коментарі задачі ───────────────────────────────────────────── */
  function fmtCmtDate(d) {
    if (!d) return '';
    let ms = d;
    if (typeof d === 'string' && /^\d+$/.test(d)) ms = Number(d);
    if (typeof ms === 'number' && ms < 1e12) ms *= 1000;   // unix seconds → ms
    const dt = new Date(ms);
    return isNaN(dt) ? '' : dt.toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  }
  function renderComments(list) {
    const box = $('#cmtList');
    if (!list.length) { box.innerHTML = '<div class="cmt-hint">Коментарів поки немає.</div>'; return; }
    box.innerHTML = list.map((c) => {
      const files = (c.files || []).map((f) => f.url
        ? `<a href="${escapeHtml(f.url)}" target="_blank" rel="noopener">📎 ${escapeHtml(f.name)}</a>`
        : `<span>📎 ${escapeHtml(f.name)}</span>`).join('');
      return `<div class="cmt">
        <div class="cmt-top"><span class="cmt-author">${escapeHtml(c.author || '')}</span><span class="cmt-date">${fmtCmtDate(c.date)}</span></div>
        ${c.text ? `<p class="cmt-text">${escapeHtml(c.text)}</p>` : ''}
        ${files ? `<div class="cmt-files">${files}</div>` : ''}
      </div>`;
    }).join('');
  }
  async function loadComments() {
    const box = $('#cmtList');
    if (!openTaskId || !box) return;
    if (!inTelegram) { box.innerHTML = '<div class="cmt-hint">Коментарі доступні лише в Telegram.</div>'; return; }
    box.innerHTML = '<div class="cmt-hint">Завантаження коментарів…</div>';
    try {
      const res = await commentsApi(openTaskId);
      if (!res.ok) throw new Error(res.error || 'comments_failed');
      renderComments(res.comments || []);
    } catch (e) {
      box.innerHTML = '<div class="cmt-hint">Не вдалося завантажити коментарі.</div>';
    }
  }

  function toastOk(msg) {
    const el = $('#toast'); el.textContent = msg; el.classList.add('show', 'ok');
    clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show', 'ok'), 2600);
  }

  /* ══════════════════════════════════════════════════════════════
     7. СЛУХАЧІ
     ══════════════════════════════════════════════════════════════ */
  $('#pickBtn').addEventListener('click', () => $('#fileInput').click());
  $('#fileInput').addEventListener('change', onPickFiles);
  $('#sendBtn').addEventListener('click', sendComment);
  $('#cmtText').addEventListener('input', updateSendBtn);
  $('#fileList').addEventListener('click', (e) => {
    const b = e.target.closest('.rm'); if (b) { pendingFiles.splice(+b.dataset.i, 1); renderFiles(); }
  });
  $('#list').addEventListener('click', (e) => {
    const card = e.target.closest('.task'); if (card) openDetail(card.dataset.id);
  });
  $('#filters').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    currentFilter = b.dataset.f;
    [...$('#filters').children].forEach((x) => x.classList.toggle('on', x === b));
    renderList(); haptic('light');
  });
  $('#dCheck').addEventListener('click', (e) => {
    const row = e.target.closest('.check-item');
    if (row && !row.classList.contains('pending')) toggleCheck(row.dataset.cid, row);
  });
  $('#cmtRefresh').addEventListener('click', loadComments);
  $('#backBtn').addEventListener('click', goBack);
  $('#actionBtn').addEventListener('click', completeTask);
  $('#retryBtn').addEventListener('click', reload);
  $('#resetBtn').addEventListener('click', () => {
    tasks = structuredClone(DEMO_TASKS); renderList(); haptic('medium');
  });
  if (inTelegram) {
    tg.BackButton?.onClick(goBack);
    tg.MainButton?.onClick(completeTask);
  }

  /* ══════════════════════════════════════════════════════════════
     8. СТАРТ
     ══════════════════════════════════════════════════════════════ */
  async function reload() {
    showState('loading');
    try {
      tasks = await loadTasksFromApi();
      renderHeader(); renderList(); showState('app');
    } catch (e) {
      $('#errText').textContent = "Перевірте з'єднання та спробуйте ще раз.";
      showState('error');
    }
  }

  async function init() {
    renderHeader();
    if (!inTelegram) {
      document.body.classList.add('demo');
      tasks = structuredClone(DEMO_TASKS);
      renderList(); showState('app');
      return;
    }
    await reload();
  }

  init();
  </script>
</body>
</html>
